<style>
:root {
  --aws: #FF9900;
  --aws-dark: #e68900;
  --cloud: #232F3E;
  --cloud-mid: #37475A;
  --cloud-light: #4A5568;
  --white: #FFFFFF;
  --off-white: #F7F8FA;
  --gray: #8896A5;
  --border: rgba(255,153,0,0.2);
  --glow: 0 0 30px rgba(255,153,0,0.3);
  --font-display: 'Syne', sans-serif;
  --font-mono: 'Space Mono', monospace;
  --transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
}

[data-theme="light"] {
  --bg: #F0F2F5;
  --surface: #FFFFFF;
  --surface2: #F7F8FA;
  --text: #232F3E;
  --text-muted: #4A5568;
  --border-col: rgba(35,47,62,0.12);
}
[data-theme="dark"] {
  --bg: #0D1117;
  --surface: #161B22;
  --surface2: #1C2430;
  --text: #E6EDF3;
  --text-muted: #8B949E;
  --border-col: rgba(255,153,0,0.15);
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  font-family: var(--font-display);
  background: var(--bg);
  color: var(--text);
  line-height: 1.7;
  overflow-x: hidden;
  transition: background var(--transition), color var(--transition);
}

/* Scroll Progress */
#scroll-progress {
  position: fixed;
  top: 0; left: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--aws), #FFD700);
  width: 0%;
  z-index: 9999;
  transition: width 0.1s;
}

/* NAV */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 1000;
  background: rgba(13,17,23,0.85);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 2rem;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: all var(--transition);
}
[data-theme="light"] nav {
  background: rgba(240,242,245,0.9);
}
.nav-logo {
  font-family: var(--font-mono);
  font-size: 1.1rem;
  color: var(--aws);
  letter-spacing: -0.02em;
}
.nav-logo span { color: var(--text); }
.nav-links {
  display: flex;
  list-style: none;
  gap: 0.25rem;
}
.nav-links a {
  text-decoration: none;
  color: var(--text-muted);
  font-size: 0.82rem;
  font-family: var(--font-mono);
  letter-spacing: 0.05em;
  padding: 0.4rem 0.8rem;
  border-radius: 6px;
  transition: all var(--transition);
}
.nav-links a:hover { color: var(--aws); background: rgba(255,153,0,0.08); }
.nav-right { display: flex; align-items: center; gap: 0.75rem; }
.theme-toggle {
  background: var(--surface);
  border: 1px solid var(--border-col);
  border-radius: 50%;
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: var(--aws);
  font-size: 0.85rem;
  transition: all var(--transition);
}
.theme-toggle:hover { background: var(--aws); color: var(--cloud); }
.hamburger { display: none; cursor: pointer; color: var(--text); font-size: 1.25rem; }

/* HERO */
.hero {
  min-height: 100vh;
  background: var(--cloud);
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  padding-top: 64px;
}
.hero-canvas {
  position: absolute;
  inset: 0;
  z-index: 0;
}
.hero-inner {
  position: relative;
  z-index: 2;
  max-width: 1200px;
  margin: 0 auto;
  padding: 4rem 2rem;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4rem;
  align-items: center;
}
.hero-tag {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
